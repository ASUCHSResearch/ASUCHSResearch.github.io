<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CHS Research Day Poster Companion</title>
  <style>
    :root {
      --bg: #f3efe7;
      --paper: rgba(255, 252, 247, 0.9);
      --panel: rgba(255, 255, 255, 0.82);
      --line: rgba(44, 37, 31, 0.14);
      --line-strong: rgba(44, 37, 31, 0.24);
      --text: #221c16;
      --muted: #6a5d52;
      --accent: #0e6b63;
      --accent-soft: rgba(14, 107, 99, 0.12);
      --shadow: 0 18px 40px rgba(58, 41, 24, 0.08);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.7), transparent 36%),
        linear-gradient(145deg, #efe7d8 0%, #f7f2ea 38%, #e7efe8 100%);
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
      line-height: 1.45;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(34, 28, 22, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34, 28, 22, 0.02) 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.7;
    }

    .shell {
      position: relative;
      z-index: 1;
      width: min(1400px, calc(100% - 20px));
      margin: 10px auto 20px;
    }

    .masthead {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--paper);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3 {
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      line-height: 1.05;
      margin: 0;
    }

    h1 {
      margin-top: 10px;
      font-size: clamp(1.6rem, 3vw, 2.35rem);
      max-width: none;
    }

    .subhead {
      margin-top: 8px;
      max-width: 90ch;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .masthead-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .app {
      display: grid;
      gap: 18px;
      margin-top: 18px;
      grid-template-columns: 360px minmax(0, 1fr);
      align-items: start;
    }

    .app.directory-only {
      grid-template-columns: minmax(0, 1fr);
    }

    .app.directory-only .detail {
      display: none;
    }

    .app.directory-only .directory {
      position: static;
      max-width: none;
      margin: 0;
      width: 100%;
    }

    .shell.directory-only .masthead,
    .shell.directory-only .masthead-actions {
      justify-content: flex-start;
      text-align: left;
    }

    .app.poster-open {
      grid-template-columns: minmax(0, 1fr);
    }

    .app.poster-open .directory {
      display: none;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .directory {
      padding: 16px;
      position: sticky;
      top: 18px;
    }

    .detail {
      padding: 18px;
      min-height: 70vh;
    }

    .section-label {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .search {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.88);
      color: var(--text);
      font-size: 15px;
      outline: none;
    }

    .search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(14, 107, 99, 0.14);
    }

    .directory-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 12px 0 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .filter-chip {
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.86);
      color: var(--muted);
      font-size: 12px;
    }

    .filter-chip.active {
      background: var(--accent-soft);
      border-color: rgba(14, 107, 99, 0.35);
      color: var(--accent);
    }

    .list {
      display: grid;
      gap: 10px;
      max-height: calc(100vh - 240px);
      overflow: auto;
      padding-right: 2px;
    }

    .poster-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.88);
      cursor: pointer;
      text-align: left;
      transition: transform 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
    }

    .poster-card:hover,
    .poster-card:focus-visible {
      transform: translateY(-1px);
      border-color: var(--line-strong);
      box-shadow: 0 12px 26px rgba(58, 41, 24, 0.08);
      outline: none;
    }

    .poster-card.active {
      border-color: rgba(14, 107, 99, 0.38);
      background: linear-gradient(180deg, rgba(14, 107, 99, 0.12), rgba(255, 255, 255, 0.94));
    }

    .poster-card h3 {
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .card-meta {
      color: var(--text);
      font-size: 14px;
      font-weight: 650;
    }

    .card-copy {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .pill-row,
    .action-row,
    .stat-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
      color: var(--muted);
      font-size: 13px;
    }

    a.pill {
      color: var(--muted);
      text-decoration: none;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      color: var(--text);
      font-size: 12px;
    }

    .mode-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .mode-btn {
      padding: 8px 11px;
      border-radius: 999px;
      font-size: 13px;
      background: rgba(255, 255, 255, 0.76);
    }

    .mode-btn.active {
      background: var(--accent-soft);
      border-color: rgba(14, 107, 99, 0.35);
      color: var(--accent);
    }

    button,
    select {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      border-radius: 14px;
      padding: 11px 14px;
      font: inherit;
    }

    button {
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(58, 41, 24, 0.08);
      border-color: var(--line-strong);
    }

    button.primary {
      background: linear-gradient(135deg, #0e6b63, #0f8979);
      color: #fff;
      border-color: transparent;
    }

    button.ghost {
      background: transparent;
    }

    button:disabled,
    select:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .hero {
      display: grid;
      gap: 12px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }

    .hero-title-row {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 8px 14px;
    }

    .hero h2 {
      font-size: clamp(1.2rem, 2vw, 1.7rem);
      max-width: none;
      line-height: 1.12;
      text-wrap: balance;
      flex: 1 1 560px;
      min-width: 0;
    }

    .hero-author {
      color: var(--text);
      font-size: 1.02rem;
      font-weight: 650;
      white-space: nowrap;
    }

    .hero-category {
      color: var(--accent);
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .toolkit {
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.82);
    }

    .toolkit-copy {
      color: var(--muted);
      font-size: 13px;
      margin: 0;
    }

    .detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .detail-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 14px;
    }

    .detail-card {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.84);
    }

    .detail-card.full {
      grid-column: 1 / -1;
    }

    .detail-card h3 {
      font-size: 1.02rem;
      margin-bottom: 10px;
    }

    .detail-card p {
      margin: 0;
    }

    .detail-card ul {
      margin: 0;
      padding-left: 18px;
    }

    .detail-card li + li {
      margin-top: 8px;
    }

    .question {
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.86);
    }

    .question strong,
    .collab strong {
      display: block;
      margin-bottom: 6px;
    }

    .question p,
    .collab p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .question + .question,
    .collab + .collab {
      margin-top: 10px;
    }

    .audience-box {
      display: grid;
      gap: 12px;
    }

    .audience-copy {
      padding: 14px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.88);
      color: var(--text);
    }

    .prompt-box {
      padding: 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fcfaf6;
      color: var(--muted);
      white-space: pre-wrap;
      font-size: 13px;
      line-height: 1.4;
      max-height: 210px;
      overflow: auto;
    }

    .empty-state,
    .status {
      padding: 22px;
      border-radius: 20px;
      border: 1px dashed var(--line-strong);
      background: rgba(255, 255, 255, 0.66);
      color: var(--muted);
    }

    .status.error {
      color: #7d2e2e;
      border-color: rgba(125, 46, 46, 0.3);
      background: rgba(255, 241, 239, 0.8);
    }

    .tiny {
      color: var(--muted);
      font-size: 12px;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }

      .directory {
        position: static;
      }

      .list {
        max-height: none;
        overflow: visible;
      }

      .detail-grid {
        grid-template-columns: 1fr;
      }

      .masthead {
        flex-direction: column;
      }

      .masthead-actions {
        justify-content: flex-start;
      }

      .app.poster-open .directory {
        display: none;
      }

      .app.poster-open .detail {
        display: block;
      }

      .detail {
        padding: 18px;
        min-height: auto;
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: calc(100% - 12px);
        margin: 6px auto 14px;
      }

      .masthead {
        padding: 14px;
        border-radius: 18px;
      }

      h1 {
        font-size: 1.45rem;
        max-width: none;
      }

      .subhead {
        font-size: 0.88rem;
      }

      .directory,
      .detail {
        padding: 12px;
      }

      .poster-card {
        padding: 12px;
      }

      .poster-card h3 {
        font-size: 1rem;
      }

      .hero h2 {
        font-size: 1.18rem;
      }

      .hero-author {
        font-size: 0.95rem;
        white-space: normal;
      }

      .action-row {
        display: grid;
        grid-template-columns: 1fr;
      }

      .mode-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .action-row button,
      .action-row select,
      .mode-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="masthead">
      <div>
        <div class="eyebrow">College of Health Solutions · 2026</div>
        <h1>CHS Research Day Poster Companion</h1>
        <p class="subhead">Browse posters, find the one in front of you, and open a quick companion with prompts and key details.</p>
      </div>
      <div class="masthead-actions">
        <a class="pill" href="./instructions.html">How to use this app</a>
        <button class="ghost hidden" id="homeBtn" type="button">Directory</button>
      </div>
    </header>

    <main class="app" id="appShell">
      <aside class="panel directory">
        <p class="section-label">Poster Directory</p>
        <input id="searchInput" class="search" type="search" placeholder="Search by title, researcher, or category">
        <div id="categoryFilters" class="filter-row" aria-live="polite"></div>
        <div class="directory-meta">
          <span id="resultCount">Loading posters…</span>
        </div>
        <div id="directoryStatus" class="status hidden"></div>
        <div id="posterList" class="list" aria-live="polite"></div>
      </aside>

      <section class="panel detail" id="detailPanel" aria-live="polite">
        <div id="detailContent" class="empty-state"></div>
      </section>
    </main>
  </div>

  <script>
    const GPT_URL_AM = "https://chatgpt.com/g/g-69b0c92ff1f48191b51b8974be391c37-chs-2026-research-day-posters-a-m";
    const GPT_URL_NZ = "https://chatgpt.com/g/g-69b109ac0a7c8191b2cdf3bab8bff2b3-chs-2026-research-day-posters-n-z";
    const STORAGE_KEY = "chs-research-day-companion-preferences";

    const state = {
      index: [],
      filtered: [],
      selected: null,
      search: "",
      activeCategory: "",
      audience: "general",
      tone: "friendly",
      promptMode: "hook",
      loadingPoster: false,
      detailError: "",
      copyStatus: ""
    };

    const AUDIENCE_OPTIONS = [
      { value: "general", label: "General attendee" },
      { value: "undergrad", label: "Undergraduate student" },
      { value: "grad", label: "Graduate student" },
      { value: "researcher", label: "Researcher / faculty" },
      { value: "clinician", label: "Clinician" },
      { value: "community", label: "Community partner" },
      { value: "leader", label: "Administrator / leader" }
    ];

    const TONE_OPTIONS = [
      { value: "friendly", label: "Friendly + clear" },
      { value: "direct", label: "Direct + concise" },
      { value: "curious", label: "Curious + conversational" },
      { value: "skeptical", label: "Skeptical reviewer" }
    ];

    const PROMPT_MODES = {
      hook: {
        label: "Quick overview",
        build(poster) {
          return [
            "I am standing in front of a CHS Research Day poster.",
            "",
            `Title: ${poster.title}`,
            `Researcher: ${poster.researcher}`,
            `Poster ID: ${poster.poster_id || "Not listed"}`,
            `Audience: ${getAudienceLabel(state.audience)}`,
            `Tone: ${getToneLabel(state.tone)}`,
            "",
            "Give me a quick, attendee-friendly overview of this poster.",
            "Then give me:",
            "1. A short plain-language explanation for this audience.",
            "2. Three bullets: what they did, what they found, why it matters.",
            "3. One sentence I can say to the presenter that shows I get it."
          ].join("\n");
        }
      },
      ask: {
        label: "Smart questions",
        build(poster) {
          return [
            "I am at a CHS Research Day poster and want better-than-generic questions.",
            "",
            `Title: ${poster.title}`,
            `Researcher: ${poster.researcher}`,
            `Poster ID: ${poster.poster_id || "Not listed"}`,
            `Audience: ${getAudienceLabel(state.audience)}`,
            `Tone: ${getToneLabel(state.tone)}`,
            "",
            "Give me:",
            "1. Three thoughtful questions I can ask the presenter.",
            "2. For each question, tell me why it is a good question.",
            "3. For each question, tell me what a strong answer might sound like.",
            "4. One bonus collaboration-probe question."
          ].join("\n");
        }
      },
      impact: {
        label: "Why it matters",
        build(poster) {
          return [
            "Help me understand why this CHS Research Day poster matters.",
            "",
            `Title: ${poster.title}`,
            `Researcher: ${poster.researcher}`,
            `Poster ID: ${poster.poster_id || "Not listed"}`,
            `Audience: ${getAudienceLabel(state.audience)}`,
            `Tone: ${getToneLabel(state.tone)}`,
            "",
            "Please give me:",
            "1. Why this work matters for this audience.",
            "2. Who could benefit from it or care about it.",
            "3. One or two practical implications.",
            "4. One sentence I could use to explain the importance to someone else."
          ].join("\n");
        }
      },
      explore: {
        label: "Things to explore",
        build(poster) {
          return [
            "I want to ask thoughtful follow-up questions about this CHS Research Day poster.",
            "",
            `Title: ${poster.title}`,
            `Researcher: ${poster.researcher}`,
            `Poster ID: ${poster.poster_id || "Not listed"}`,
            `Audience: ${getAudienceLabel(state.audience)}`,
            `Tone: ${getToneLabel(state.tone)}`,
            "",
            "Please give me:",
            "1. The main uncertainties, open questions, or things worth clarifying.",
            "2. Two respectful questions I could ask the presenter about those areas.",
            "3. One idea for what could strengthen this work in a next step."
          ].join("\n");
        }
      },
      collab: {
        label: "Collaboration ideas",
        build(poster) {
          return [
            "I want to explore a collaboration around this CHS Research Day poster.",
            "",
            `Title: ${poster.title}`,
            `Researcher: ${poster.researcher}`,
            `Poster ID: ${poster.poster_id || "Not listed"}`,
            `My audience / role: ${getAudienceLabel(state.audience)}`,
            `Tone: ${getToneLabel(state.tone)}`,
            "",
            "Please:",
            "1. Suggest two or three collaboration angles.",
            "2. Tell me what kind of partner would be useful for each.",
            "3. Draft a short sentence I can say to the presenter to open that conversation.",
            "4. Suggest one concrete next step for a follow-up meeting."
          ].join("\n");
        }
      },
      translate: {
        label: "Plain language",
        build(poster) {
          return [
            "I need a simpler explanation of this CHS Research Day poster.",
            "",
            `Title: ${poster.title}`,
            `Researcher: ${poster.researcher}`,
            `Poster ID: ${poster.poster_id || "Not listed"}`,
            `Audience: ${getAudienceLabel(state.audience)}`,
            `Tone: ${getToneLabel(state.tone)}`,
            "",
            "Please:",
            "1. Rewrite the poster in plain, non-jargony language for this audience.",
            "2. Give me one sentence on why it matters.",
            "3. Give me one metaphor or analogy if it fits.",
            "4. Give me one question I can ask if I only have 20 seconds."
          ].join("\n");
        }
      }
    };

    const searchInput = document.getElementById("searchInput");
    const resultCount = document.getElementById("resultCount");
    const posterList = document.getElementById("posterList");
    const categoryFilters = document.getElementById("categoryFilters");
    const detailContent = document.getElementById("detailContent");
    const directoryStatus = document.getElementById("directoryStatus");
    const homeBtn = document.getElementById("homeBtn");
    const appShell = document.getElementById("appShell");
    const shell = document.querySelector(".shell");

    function loadPreferences() {
      try {
        const raw = window.localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          return;
        }

        const saved = JSON.parse(raw);
        const validAudience = AUDIENCE_OPTIONS.some((option) => option.value === saved.audience);
        const validTone = TONE_OPTIONS.some((option) => option.value === saved.tone);
        const validPromptMode = Object.prototype.hasOwnProperty.call(PROMPT_MODES, saved.promptMode);

        if (validAudience) {
          state.audience = saved.audience;
        }
        if (validTone) {
          state.tone = saved.tone;
        }
        if (validPromptMode) {
          state.promptMode = saved.promptMode;
        }
      } catch (error) {
        window.localStorage.removeItem(STORAGE_KEY);
      }
    }

    function savePreferences() {
      try {
        window.localStorage.setItem(
          STORAGE_KEY,
          JSON.stringify({
            audience: state.audience,
            tone: state.tone,
            promptMode: state.promptMode
          })
        );
      } catch (error) {
        // Ignore storage failures; the page should still work without persistence.
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function readPosterIdFromUrl() {
      return new URLSearchParams(window.location.search).get("id");
    }

    function updateUrl(id) {
      const url = new URL(window.location.href);
      if (id) {
        url.searchParams.set("id", id);
      } else {
        url.searchParams.delete("id");
      }
      window.history.pushState({}, "", url);
    }

    function normalizePosterPath(pathValue, id) {
      const trimmed = String(pathValue || "").trim();
      if (trimmed) {
        if (trimmed.startsWith("/")) {
          return `.${trimmed}`;
        }
        return trimmed;
      }
      return `./posters/${id}.json`;
    }

    function getCategories() {
      return [...new Set(state.index.map((item) => item.category).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b));
    }

    function renderLayout() {
      const hasPoster = Boolean(state.selected || state.loadingPoster || state.detailError);
      appShell.classList.toggle("directory-only", !hasPoster);
      appShell.classList.toggle("poster-open", hasPoster);
      shell.classList.toggle("directory-only", !hasPoster);
      homeBtn.classList.toggle("hidden", !hasPoster);
    }

    function scrollToPosterTop() {
      if (!window.matchMedia("(max-width: 980px)").matches) {
        return;
      }

      const active = document.activeElement;
      if (active && typeof active.blur === "function") {
        active.blur();
      }

      window.requestAnimationFrame(() => {
        shell.scrollIntoView({ block: "start", behavior: "auto" });
      });
    }

    async function fetchJson(primaryPath, fallbackPath) {
      const primary = await fetch(primaryPath, { cache: "no-store" });
      if (primary.ok) {
        return primary.json();
      }

      if (fallbackPath) {
        const fallback = await fetch(fallbackPath, { cache: "no-store" });
        if (fallback.ok) {
          return fallback.json();
        }
      }

      throw new Error(`Unable to load ${primaryPath}`);
    }

    function filterIndex() {
      const query = state.search.trim().toLowerCase();
      state.filtered = state.index.filter((item) => {
        const matchCategory = !state.activeCategory || item.category === state.activeCategory;
        if (!query) {
          return matchCategory;
        }

        const haystack = [
          item.title,
          item.researcher,
          item.researcher_last_name,
          item.category,
          item.one_liner,
          ...(item.tags || [])
        ].join(" ").toLowerCase();

        return matchCategory && haystack.includes(query);
      });
    }

    function renderCategoryFilters() {
      const categories = getCategories();
      categoryFilters.innerHTML = "";

      if (!categories.length) {
        return;
      }

      const allButton = document.createElement("button");
      allButton.type = "button";
      allButton.className = `filter-chip${!state.activeCategory ? " active" : ""}`;
      allButton.textContent = "All categories";
      allButton.addEventListener("click", () => {
        state.activeCategory = "";
        renderDirectory();
      });
      categoryFilters.appendChild(allButton);

      for (const category of categories) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `filter-chip${state.activeCategory === category ? " active" : ""}`;
        button.textContent = category;
        button.addEventListener("click", () => {
          state.activeCategory = state.activeCategory === category ? "" : category;
          renderDirectory();
        });
        categoryFilters.appendChild(button);
      }
    }

    function renderDirectory() {
      filterIndex();
      renderCategoryFilters();
      resultCount.textContent = state.filtered.length === 1
        ? "1 poster"
        : `${state.filtered.length} posters`;

      posterList.innerHTML = "";

      if (!state.filtered.length) {
        posterList.innerHTML = '<div class="empty-state">No posters match this search.</div>';
        return;
      }

      for (const item of state.filtered) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `poster-card${state.selected && state.selected.id === item.id ? " active" : ""}`;
        button.innerHTML = `
          <h3>${escapeHtml(item.title)}</h3>
          <div class="card-meta">${escapeHtml(item.researcher)}</div>
          <div class="card-copy">${escapeHtml(item.category || "")}</div>
        `;
        button.addEventListener("click", () => {
          void selectPoster(item.id, true);
        });
        posterList.appendChild(button);
      }
    }

    function renderStatus(message, isError) {
      if (!message) {
        directoryStatus.classList.add("hidden");
        directoryStatus.textContent = "";
        directoryStatus.classList.remove("error");
        return;
      }

      directoryStatus.classList.remove("hidden");
      directoryStatus.textContent = message;
      directoryStatus.classList.toggle("error", Boolean(isError));
    }

    function createTagRow(tags) {
      return (tags || [])
        .map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`)
        .join("");
    }

    function buildPrompt(poster) {
      const mode = PROMPT_MODES[state.promptMode] || PROMPT_MODES.hook;
      return mode.build(poster);
    }

    function getAudienceLabel(value) {
      return AUDIENCE_OPTIONS.find((option) => option.value === value)?.label || value;
    }

    function getToneLabel(value) {
      return TONE_OPTIONS.find((option) => option.value === value)?.label || value;
    }

    function getAudienceCopy(poster) {
      const versions = poster.summary.audience_versions || {};
      switch (state.audience) {
        case "undergrad":
          return versions.student || poster.summary.summary_30s;
        case "grad":
          return versions.student || poster.summary.summary_30s;
        case "researcher":
          return versions.clinician || poster.summary.summary_30s;
        case "clinician":
          return versions.clinician || poster.summary.summary_30s;
        case "community":
          return versions.community || poster.summary.summary_30s;
        case "leader":
          return versions.funder || poster.summary.summary_30s;
        case "general":
        default:
          return poster.summary.summary_30s;
      }
    }

    function getGptUrl(poster) {
      if (poster?.routing?.gpt_group === "N-Z") {
        return GPT_URL_NZ;
      }
      return GPT_URL_AM;
    }

    function getRouteLabel(poster) {
      return poster?.routing?.gpt_group === "N-Z" ? "N–Z GPT" : "A–M GPT";
    }

    function renderDetail() {
      renderLayout();

      if (state.loadingPoster) {
        detailContent.className = "status";
        detailContent.textContent = "Loading poster…";
        return;
      }

      if (state.detailError) {
        detailContent.className = "status error";
        detailContent.textContent = state.detailError;
        return;
      }

      if (!state.selected) {
        detailContent.className = "empty-state";
        detailContent.textContent = "";
        return;
      }

      const poster = state.selected;
      const prompt = buildPrompt(poster);

      detailContent.className = "";
      detailContent.innerHTML = `
        <div class="hero">
          <div>
            <div class="hero-title-row">
              <h2>${escapeHtml(poster.title)}</h2>
              <div class="hero-author">${escapeHtml(poster.researcher)}</div>
            </div>
            <div class="hero-category">${escapeHtml(poster.category || "")}</div>
            <div class="detail-tags">${createTagRow(poster.tags)}</div>
          </div>
          <div class="toolkit">
            <p class="section-label">Ask GPT</p>
            <p class="toolkit-copy">Choose a prompt style, then copy it or open the custom GPT.</p>
            <div class="mode-row">
              ${Object.entries(PROMPT_MODES).map(([key, mode]) => `
                <button type="button" class="mode-btn${state.promptMode === key ? " active" : ""}" data-prompt-mode="${escapeHtml(key)}">${escapeHtml(mode.label)}</button>
              `).join("")}
            </div>
            <div class="prompt-box">${escapeHtml(prompt)}</div>
            <div class="action-row">
              <select id="audienceSelect" aria-label="Audience version">
                ${AUDIENCE_OPTIONS.map((option) => `<option value="${escapeHtml(option.value)}"${state.audience === option.value ? " selected" : ""}>${escapeHtml(option.label)}</option>`).join("")}
              </select>
              <select id="toneSelect" aria-label="Prompt tone">
                ${TONE_OPTIONS.map((option) => `<option value="${escapeHtml(option.value)}"${state.tone === option.value ? " selected" : ""}>${escapeHtml(option.label)}</option>`).join("")}
              </select>
              <button class="primary" type="button" id="copyPromptBtn">Copy prompt</button>
              <button type="button" id="openGptBtn">Open GPT</button>
            </div>
            <div class="tiny">${escapeHtml(state.copyStatus || "Static summary below. GPT access is optional.")}</div>
          </div>
        </div>

        <div class="detail-grid">
          <article class="detail-card">
            <p class="section-label">30-Second Summary</p>
            <p>${escapeHtml(poster.summary.summary_30s)}</p>
          </article>

          <article class="detail-card">
            <h3>Key Numbers</h3>
            <ul>${(poster.summary.key_numbers || []).map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
          </article>

          <article class="detail-card">
            <h3>Takeaways</h3>
            <ul>${(poster.summary.takeaways || []).map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
          </article>

          <article class="detail-card">
            <h3>Questions To Ask</h3>
            ${(poster.summary.what_to_ask || []).map((item) => `
              <div class="question">
                <strong>${escapeHtml(item.question)}</strong>
              </div>
            `).join("")}
          </article>

        </div>
      `;

      document.getElementById("copyPromptBtn").addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(prompt);
          state.copyStatus = "Poster-specific prompt copied.";
        } catch (error) {
          state.copyStatus = "Clipboard copy failed in this browser.";
        }
        renderDetail();
      });

      document.getElementById("openGptBtn").addEventListener("click", () => {
        window.open(getGptUrl(poster), "_blank", "noopener");
      });

      document.getElementById("audienceSelect").addEventListener("change", (event) => {
        state.audience = event.target.value;
        savePreferences();
        renderDetail();
      });

      document.getElementById("toneSelect").addEventListener("change", (event) => {
        state.tone = event.target.value;
        state.copyStatus = "";
        savePreferences();
        renderDetail();
      });

      document.querySelectorAll("[data-prompt-mode]").forEach((button) => {
        button.addEventListener("click", () => {
          state.promptMode = button.getAttribute("data-prompt-mode");
          state.copyStatus = "";
          savePreferences();
          renderDetail();
        });
      });
    }

    async function selectPoster(id, pushUrl) {
      const entry = state.index.find((item) => item.id === id);
      if (!entry) {
        state.selected = null;
        state.detailError = `Poster "${id}" was not found in the directory.`;
        renderDirectory();
        renderDetail();
        return;
      }

      if (pushUrl) {
        updateUrl(id);
      }

      state.loadingPoster = true;
      state.detailError = "";
      state.copyStatus = "";
      renderDirectory();
      renderDetail();

      try {
        const detailPath = normalizePosterPath(entry.path, id);
        const poster = await fetchJson(detailPath, `./posters/${id}.json`);
        state.selected = poster;
      } catch (error) {
        state.selected = null;
        state.detailError = "The poster detail file could not be loaded.";
      } finally {
        state.loadingPoster = false;
        renderDirectory();
        renderDetail();
        if (pushUrl) {
          scrollToPosterTop();
        }
      }
    }

    async function loadIndex() {
      renderStatus("", false);

      try {
        const index = await fetchJson("./posters/index.json", "/posters/index.json");
        state.index = [...index].sort((a, b) => a.researcher_last_name.localeCompare(b.researcher_last_name) || a.title.localeCompare(b.title));
        renderDirectory();

        const idFromUrl = readPosterIdFromUrl();
        if (idFromUrl) {
          await selectPoster(idFromUrl, false);
        } else {
          renderDetail();
        }
      } catch (error) {
        renderStatus("Could not load /posters/index.json. Host this app as a static site so fetch() can read the generated JSON files.", true);
        resultCount.textContent = "0 posters";
        renderDetail();
      }
    }

    searchInput.addEventListener("input", (event) => {
      state.search = event.target.value;
      renderDirectory();
    });

    homeBtn.addEventListener("click", () => {
      state.selected = null;
      state.detailError = "";
      state.copyStatus = "";
      updateUrl("");
      renderDirectory();
      renderDetail();
    });

    window.addEventListener("popstate", async () => {
      const idFromUrl = readPosterIdFromUrl();
      if (!idFromUrl) {
        state.selected = null;
        state.detailError = "";
        state.copyStatus = "";
        renderDirectory();
        renderDetail();
        return;
      }

      await selectPoster(idFromUrl, false);
    });

    loadPreferences();
    void loadIndex();
  </script>
</body>
</html>
